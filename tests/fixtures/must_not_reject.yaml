# must_not_reject.yaml — MEAS-02 CI safety-net fixture set (D-15, D-16)
#
# SCOPE BOUNDARY: this is a REPRESENTATIVE SAMPLE of clinical-content shapes
# across 5 categories (icd_code, dosage, loinc, hipaa_ref,
# cardinality_constraint), hand-authored to exercise the healthcare domain
# pack's normative_allowlists patterns in domains/healthcare/filters.yaml.
# It is NOT an exhaustive enumeration of every protected clinical-code shape
# that could appear in real documents — a passing CI run proves these ~25
# samples survive the substance gate end-to-end, not that every possible
# ICD-10/LOINC/dosage/HIPAA/cardinality-constraint phrasing is protected.
#
# Each entry has exactly three keys: label (unique slug), text (the exact
# clinical string), category (one of the 5 MEAS-02 categories). Loaded and
# parametrized by tests/unit/test_must_not_reject.py, which calls the real
# chunk() substance gate with domain_filters resolved via
# DomainLoader.from_name("healthcare").filters.

