name: Bug Report
description: Report a reproducible problem in Knowledge Lake
title: "bug: <short description>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please search
        [existing issues](https://github.com/XploreOS/knowledge-lake/issues) first to avoid duplicates.
        For security vulnerabilities, do **not** use this form — see
        [SECURITY.md](https://github.com/XploreOS/knowledge-lake/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I run `klake ingest-url ...`, it fails with ...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal, reliable steps (commands, config, inputs).
      placeholder: |
        1. `cp .env.example .env` and set ...
        2. `docker compose up -d`
        3. Run `klake ...`
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and stack trace
      description: Relevant output. Redact any secrets.
      render: shell
  - type: input
    id: version
    attributes:
      label: Knowledge Lake version / commit
      description: Output of `uv run klake version`, or the git commit SHA.
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - CLI (klake)
        - REST API / MCP server
        - Dagster pipeline
        - Crawling / discovery
        - Parsing / cleaning / chunking
        - Enrichment / curation / dataset generation
        - Vector search / indexing (Qdrant)
        - Storage (MinIO / S3) / registry (Postgres)
        - Domain pack
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, Docker version, deployment (local/cloud).
      placeholder: |
        - OS: Ubuntu 24.04
        - Python: 3.12.4
        - Docker: 27.x
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I redacted any secrets from logs and config.
          required: true
