name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_FROZEN: "1"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Ruff check
        run: uv run ruff check src/ --output-format=github

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      # Advisory: the codebase has known pre-existing type-check debt. This step
      # surfaces mypy findings on PRs without failing the check. Drop
      # `continue-on-error` once the backlog is cleared to make it a hard gate.
      - name: mypy (advisory)
        continue-on-error: true
        run: uv run mypy src/

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Run unit tests
        run: uv run pytest tests/unit -m "not browser" -q

  integration:
    name: Integration tests
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Write .env for compose stack
        # KLAKE_STORAGE__ACCESS_KEY_ID / SECRET_ACCESS_KEY have no defaults
        # (WR-09) — compose fails loudly without them. Secret must be >= 8
        # chars (MinIO's MINIO_ROOT_PASSWORD minimum).
        run: |
          cat > .env <<'EOF'
          KLAKE_STORAGE__ACCESS_KEY_ID=klake-ci-access
          KLAKE_STORAGE__SECRET_ACCESS_KEY=klake-ci-secret
          EOF
      - name: Bring up service stack
        # Compose is the single source of truth for services (KL-03 finding):
        # the MinIO image needs `server /data`, which Actions `services:`
        # blocks cannot express. Only bring up the services integration tests
        # need — postgres, minio, qdrant — not litellm/dagster/api.
        run: docker compose up -d postgres minio qdrant
      - name: Wait for services healthy
        run: |
          for i in $(seq 1 30); do
            unhealthy=$(docker compose ps postgres minio qdrant --format '{{.Name}} {{.Health}}' | grep -v -E ' healthy$' || true)
            if [ -z "$unhealthy" ]; then
              echo "All services healthy."
              docker compose ps postgres minio qdrant
              exit 0
            fi
            echo "Waiting for services to become healthy (attempt $i/30)..."
            sleep 5
          done
          echo "Timed out waiting for services to become healthy."
          docker compose ps postgres minio qdrant
          exit 1
      - name: Install dependencies
        run: uv sync
      - name: Run integration tests
        env:
          KLAKE_STORAGE__ACCESS_KEY_ID: klake-ci-access
          KLAKE_STORAGE__SECRET_ACCESS_KEY: klake-ci-secret
        run: uv run pytest tests/integration -m "not browser" -q
      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs
