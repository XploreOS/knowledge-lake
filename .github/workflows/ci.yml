name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_FROZEN: "1"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Ruff check
        run: uv run ruff check src/ --output-format=github

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      # Advisory: the codebase has known pre-existing type-check debt. This step
      # surfaces mypy findings on PRs without failing the check. Drop
      # `continue-on-error` once the backlog is cleared to make it a hard gate.
      - name: mypy (advisory)
        continue-on-error: true
        run: uv run mypy src/

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Run unit tests
        run: uv run pytest tests/unit -m "not browser" -q

  # ----------------------------------------------------------------------------
  # Integration tests require the service stack (Postgres, MinIO, Qdrant, ...).
  # They are intentionally not run on every push to keep CI fast and reliable.
  # Run them locally with `make up && make test-integration`, or enable the
  # job below by adding the required `services:` and environment configuration.
  # ----------------------------------------------------------------------------
