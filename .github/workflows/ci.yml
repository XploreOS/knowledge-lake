name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_FROZEN: "1"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Ruff check
        run: uv run ruff check src/ --output-format=github

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      # Advisory: the codebase has known pre-existing type-check debt. This step
      # surfaces mypy findings on PRs without failing the check. Drop
      # `continue-on-error` once the backlog is cleared to make it a hard gate.
      - name: mypy (advisory)
        continue-on-error: true
        run: uv run mypy src/

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Run unit tests
        run: uv run pytest tests/unit -m "not browser" -q

  docker-build:
    name: Docker build (api image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Assert Dockerfile base matches .python-version
        # Cheap guard against the exact drift that caused KL-08: the base was
        # bumped to python:3.14-slim (unbuildable — greenlet has no CPython
        # 3.14 support) and nothing caught it because the image was never
        # built in CI. This is a fast pre-check; the build step below is the
        # real guard.
        run: |
          pinned="$(cat .python-version)"
          base_line="$(grep -m1 '^FROM python:' Dockerfile)"
          echo "Dockerfile base: ${base_line}"
          echo ".python-version: ${pinned}"
          case "${base_line}" in
            "FROM python:${pinned}-slim"*) echo "OK: base matches .python-version" ;;
            *)
              echo "FAIL: Dockerfile base (${base_line}) does not match .python-version (${pinned})"
              exit 1
              ;;
          esac
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Write .env for compose build
        # docker compose interpolates the compose file (including the
        # required KLAKE_STORAGE__* vars referenced by other services) before
        # running any subcommand, `build` included — so a value must be
        # present even though the api image itself needs no secrets to build.
        run: |
          printf '%s\n' \
            'KLAKE_STORAGE__ACCESS_KEY_ID=klake-ci-access' \
            'KLAKE_STORAGE__SECRET_ACCESS_KEY=klake-ci-secret' \
            > .env
      - name: Build api image (no push)
        # This is the actual guard KL-08/the Dockerfile landmine needed: the
        # api service has a `build:` stanza but the integration job below
        # only brings up pre-built public images (postgres/minio/qdrant), so
        # nothing in CI previously built this image. An unbuildable
        # Dockerfile could — and did — rot for 13 days behind a green badge.
        run: docker compose build api

  integration:
    name: Integration tests
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Write .env for compose stack
        # KLAKE_STORAGE__ACCESS_KEY_ID / SECRET_ACCESS_KEY have no defaults
        # (WR-09) — compose fails loudly without them. Secret must be >= 8
        # chars (MinIO's MINIO_ROOT_PASSWORD minimum).
        run: |
          printf '%s\n' \
            'KLAKE_STORAGE__ACCESS_KEY_ID=klake-ci-access' \
            'KLAKE_STORAGE__SECRET_ACCESS_KEY=klake-ci-secret' \
            > .env
      - name: Bring up service stack
        # Compose is the single source of truth for services (KL-03 finding):
        # the MinIO image needs `server /data`, which Actions `services:`
        # blocks cannot express.
        run: docker compose up -d postgres minio qdrant
      - name: Wait for services healthy
        run: |
          for i in $(seq 1 30); do
            unhealthy=$(docker compose ps postgres minio qdrant --format '{{.Name}} {{.Health}}' | grep -v -E ' healthy$' || true)
            if [ -z "$unhealthy" ]; then
              echo "All services healthy."
              docker compose ps postgres minio qdrant
              break
            fi
            echo "Waiting for services to become healthy (attempt $i/30)..."
            sleep 5
            if [ "$i" -eq 30 ]; then
              echo "Timed out waiting for services to become healthy."
              docker compose ps postgres minio qdrant
              exit 1
            fi
          done
      - name: Create MinIO bucket
        run: docker compose up minio-init
      - name: Install dependencies
        run: uv sync
      - name: Run integration tests
        env:
          KLAKE_STORAGE__ACCESS_KEY_ID: klake-ci-access
          KLAKE_STORAGE__SECRET_ACCESS_KEY: klake-ci-secret
          KLAKE_STORAGE__ENDPOINT_URL: http://localhost:9000
          KLAKE_STORAGE__BUCKET: klake-data
        run: uv run pytest tests/integration -m "not browser" -q
      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs
