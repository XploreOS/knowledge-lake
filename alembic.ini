# alembic.ini — Alembic configuration for Knowledge Lake registry.
#
# script_location points at the in-package alembic directory so migrations
# are distributed alongside the codebase and the same path works in all
# environments (local dev, Docker, CI).
#
# The database URL is intentionally NOT set here — it is read from
# Settings.database_url in env.py to keep secrets out of the config file.

[alembic]
script_location = src/knowledge_lake/registry/alembic

# Template for revision files (uses script.py.mako)
file_template = %%(rev)s_%%(slug)s

# Timezone for revision file timestamps
timezone = UTC

# Max length of slug portion in revision filenames
truncate_slug_length = 40

# Output encoding for generated migration files
output_encoding = utf-8

# ── Logging ──────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
