# Dagster instance configuration
# Reference: https://docs.dagster.io/deployment/dagster-instance
#
# Dagster uses a separate database (dagster_storage) in the same PostgreSQL
# container — never the registry database (research Open Question 5, FOUND-09).

run_storage:
  module: dagster_postgres.run_storage
  class: PostgresRunStorage
  config:
    postgres_url:
      env: DAGSTER_PG_URL

event_log_storage:
  module: dagster_postgres.event_log
  class: PostgresEventLogStorage
  config:
    postgres_url:
      env: DAGSTER_PG_URL

schedule_storage:
  module: dagster_postgres.schedule_storage
  class: PostgresScheduleStorage
  config:
    postgres_url:
      env: DAGSTER_PG_URL

run_launcher:
  module: dagster.core.launcher
  class: DefaultRunLauncher

# Per-source concurrency=1 via tag_concurrency_limits (D-16).
# This file is mounted read-only into the dagster-webserver and dagster-daemon
# compose services — a daemon restart is required after changes take effect.
run_coordinator:
  module: dagster.core.run_coordinator
  class: QueuedRunCoordinator
  config:
    tag_concurrency_limits:
      - key: "klake/source"
        value:
          applyLimitPerUniqueValue: true
        limit: 1

telemetry:
  enabled: false
